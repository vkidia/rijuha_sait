<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 90" fill="none">
  <!-- camera body -->
  <rect x="6" y="22" width="98" height="62" rx="10" fill="#dceee4" stroke="#c8b99a" stroke-width="1.5"/>
  <!-- top viewfinder bump -->
  <rect x="32" y="12" width="46" height="16" rx="5" fill="#dceee4" stroke="#c8b99a" stroke-width="1.5"/>
  <!-- flash unit -->
  <rect x="10" y="14" width="18" height="12" rx="3" fill="#c4d8cc" stroke="#c8b99a" stroke-width="1.2"/>
  <line x1="14" y1="17" x2="14" y2="23" stroke="#a0b8a8" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="18" y1="17" x2="18" y2="23" stroke="#a0b8a8" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="22" y1="17" x2="22" y2="23" stroke="#a0b8a8" stroke-width="0.9" stroke-linecap="round"/>
  <!-- viewfinder window -->
  <rect x="62" y="15" width="12" height="9" rx="2" fill="#a8c8b8" stroke="#c8b99a" stroke-width="1.2"/>
  <!-- shutter button -->
  <circle cx="96" cy="30" r="5.5" fill="#5fac7a" stroke="#c8b99a" stroke-width="1.2"/>
  <!-- lens outer ring -->
  <circle cx="55" cy="56" r="23" fill="#c4d8cc" stroke="#c8b99a" stroke-width="1.5"/>
  <!-- lens mid ring -->
  <circle cx="55" cy="56" r="16" fill="#b0c8bc" stroke="#c8b99a" stroke-width="1.2"/>
  <!-- lens inner -->
  <circle cx="55" cy="56" r="9" fill="#2e5a45" stroke="#1e3d2e" stroke-width="1"/>
  <!-- lens highlight -->
  <circle cx="51" cy="52" r="3" fill="white" opacity="0.35"/>
  <!-- strap loop -->
  <rect x="6" y="36" width="5" height="14" rx="2.5" fill="#c4d8cc" stroke="#c8b99a" stroke-width="1.2"/>
  <!-- strap cord -->
  <path d="M8.5 50 Q-2 66 6 80" stroke="#5fac7a" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
